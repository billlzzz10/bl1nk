name: Auto Project Management

on:
  push:
    branches: [ main ]
    paths:
      - 'doc/**'
      - 'constitution/**'
      - 'scripts/update-system-metadata.ts'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  metadata:
    name: Update and Validate Metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run metadata update (dry-run)
        run: npm run update:system-metadata -- --dry-run

      - name: Validate documentation naming rules (R_DOC_002)
        run: |
          # Ensure documentation files in doc/ follow the naming convention (XX_ALL_CAPS.md)
          # Excluding subdirectories and bl1nk.manifest.json
          errors=0
          while read file; do
            filename=$(basename "$file")
            if [[ ! "$filename" =~ ^[0-9]{2}_[A-Z0-9_]+\.md$ ]]; then
              echo "Error: $file does not follow naming convention (XX_ALL_CAPS.md)"
              errors=$((errors+1))
            fi
          done < <(find doc/ -maxdepth 1 -name "*.md")

          if [ $errors -ne 0 ]; then
            echo "::error::Found $errors documentation file(s) with invalid naming."
            exit 1
          fi
          echo "Documentation naming validation successful."

  status-report:
    name: Generate Project Status Report
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Report Current Status
        run: |
          echo "### Documentation and metadata validation complete." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat doc/07_WORK_TRACKING_MATRIX.md >> $GITHUB_STEP_SUMMARY
